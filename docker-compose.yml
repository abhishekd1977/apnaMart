version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: apnamart-postgres
    environment:
      POSTGRES_DB: apnamart
      POSTGRES_USER: apnamart_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apnamart_user -d apnamart"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: apnamart-backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/apnamart
      SPRING_DATASOURCE_USERNAME: apnamart_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-localpassword}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-must-be-at-least-32-characters-long!!}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: apnamart-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
